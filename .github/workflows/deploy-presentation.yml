name: Deploy AI Presentation to GitHub Pages

# Publishes ai-future-presentation.html as the GitHub Pages site.
# Self-enables Pages on first run (enablement: true), so no manual
# Settings toggle is required.

on:
  push:
    branches: [main]
    paths:
      - ai-future-presentation.html
      - .github/workflows/deploy-presentation.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          cp ai-future-presentation.html _site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
